<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Monitoreo Central</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .panel {
            background-color: #18181c;
            border: 1px solid #2d2d34;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.6em;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .status-box {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 25px;
            padding: 8px;
            border-radius: 6px;
            background-color: #222226;
            display: inline-block;
            padding: 6px 15px;
        }
        #estado-indicador {
            color: #e74c3c; /* Rojo por defecto */
            transition: color 0.3s ease;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-frontal {
            background-color: #3a86ff;
            color: #ffffff;
        }
        .btn-frontal:hover { background-color: #2a75e6; }
        .btn-trasera {
            background-color: #8338ec;
            color: #ffffff;
        }
        .btn-trasera:hover { background-color: #7026d3; }
        .btn:active { transform: scale(0.98); }
        
        .viewer-box {
            margin-top: 25px;
            border: 2px dashed #3a3a44;
            border-radius: 8px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111115;
            overflow: hidden;
        }
        #pantalla-captura {
            max-width: 100%;
            height: auto;
            display: none;
        }
        .placeholder-text {
            color: #64748b;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Control de Dispositivo</h1>
        <div class="status-box">
            Estado del M¨®vil: <span id="estado-indicador">DESCONECTADO</span>
        </div>

        <button class="btn btn-frontal" onclick="enviarComando('capturar_foto_frontal')">Capturar C¨˘mara Frontal</button>
        <button class="btn btn-trasera" onclick="enviarComando('capturar_foto_trasera')">Capturar C¨˘mara Trasera</button>

        <div class="viewer-box">
            <span id="placeholder" class="placeholder-text">Esperando captura de imagen remota...</span>
            <img id="pantalla-captura" src="" alt="Captura de dispositivo m¨®vil">
        </div>
    </div>

    <script>
        // Establecer enlace WebSocket directo a la instancia de Render
        const socket = new WebSocket("wss://servidor-nube.onrender.com");

        socket.onopen = () => {
            console.log("Conectado al canal del servidor.");
            // Identificar esta pesta?a del navegador ante el server como la interfaz de control
            socket.send(JSON.stringify({ tipo: "web" }));
        };

        socket.onmessage = (event) => {
            try {
                const datos = JSON.parse(event.data);

                // Monitoreo de estado din¨˘mico de la app de Cordova
                if (datos.estadoServicio === "CONECTADO") {
                    const ind = document.getElementById("estado-indicador");
                    ind.innerText = "CONECTADO";
                    ind.style.color = "#2ecc71"; // Verde brillante
                } 
                
                if (datos.estadoServicio === "DESCONECTADO") {
                    const ind = document.getElementById("estado-indicador");
                    ind.innerText = "DESCONECTADO";
                    ind.style.color = "#e74c3c"; // Rojo intenso
                }

                // Renderizar la foto capturada por Base64 de forma as¨Şncrona
                if (datos.accion === "mostrar_foto") {
                    document.getElementById("placeholder").style.display = "none";
                    const imgTag = document.getElementById("pantalla-captura");
                    imgTag.src = datos.imagen;
                    imgTag.style.display = "block";
                }
            } catch (err) {
                console.error("Error interpretando respuesta del websocket:", err);
            }
        };

        socket.onclose = () => {
            const ind = document.getElementById("estado-indicador");
            ind.innerText = "SERVIDOR CA¨ŞDO";
            ind.style.color = "#e74c3c";
        };

        // Funci¨®n global para despachar peticiones a la cola del servidor
        function enviarComando(nombreAccion) {
            const paqueteComando = {
                tipo: "comando_accion",
                accion: nombreAccion
            };
            socket.send(JSON.stringify(paqueteComando));
            console.log("Comando enviado al puente:", nombreAccion);
        }
    </script>
</body>
</html>
